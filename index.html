<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Agenda Digital</title>
    <style>
        /* Estilização base para não fugir do design do app */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .profile-container {
            background-color: #fff;
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 20px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h2 {
            margin: 0;
            color: #222;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-salvar {
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-salvar:hover {
            background-color: #0056b3;
        }
        .status-msg {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="header">
            <h2>Meu Perfil</h2>
        </div>

        <div class="form-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome">
        </div>

        <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" placeholder="(00) 00000-0000">
        </div>

        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>

        <button class="btn-salvar" id="btnSalvar">Salvar Dados</button>
        <div id="status" class="status-msg"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // A configuração exata que você mandou
        const firebaseConfig = {
            apiKey: "AIzaSyB5tG07i-ayAC-VKdWsez2Knd2S8YzC-oU",
            authDomain: "agenda-digital-65ca2.firebaseapp.com",
            projectId: "agenda-digital-65ca2",
            storageBucket: "agenda-digital-65ca2.firebasestorage.app",
            messagingSenderId: "339514905804",
            appId: "1:339514905804:web:a076a48f1550098dbb5e69",
            measurementId: "G-5L9BVS81TX"
        };

        // Inicializando Firebase e o Banco de Dados (Firestore)
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ID fixo de exemplo (No futuro, você pode pegar isso do login do usuário)
        const userId = "usuario_padrao_01"; 

        // Referências dos elementos na tela
        const inputNome = document.getElementById('nome');
        const inputTelefone = document.getElementById('telefone');
        const inputEmail = document.getElementById('email');
        const btnSalvar = document.getElementById('btnSalvar');
        const statusMsg = document.getElementById('status');

        // Função para carregar os dados do banco quando a tela abrir
        async function carregarPerfil() {
            try {
                const docRef = doc(db, "usuarios", userId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const dados = docSnap.data();
                    inputNome.value = dados.nome || "";
                    inputTelefone.value = dados.telefone || "";
                    inputEmail.value = dados.email || "";
                }
            } catch (error) {
                console.error("Erro ao carregar os dados: ", error);
            }
        }

        // Função para salvar os dados no banco quando clicar no botão
        btnSalvar.addEventListener('click', async () => {
            btnSalvar.innerText = "Salvando...";
            
            try {
                await setDoc(doc(db, "usuarios", userId), {
                    nome: inputNome.value,
                    telefone: inputTelefone.value,
                    email: inputEmail.value
                }, { merge: true }); // Merge garante que não apague outros dados que já existam

                statusMsg.style.color = "green";
                statusMsg.innerText = "Perfil salvo com sucesso!";
            } catch (error) {
                console.error("Erro ao salvar: ", error);
                statusMsg.style.color = "red";
                statusMsg.innerText = "Erro ao salvar. Tente novamente.";
            }

            btnSalvar.innerText = "Salvar Dados";
            
            // Apaga a mensagem de sucesso depois de 3 segundos
            setTimeout(() => {
                statusMsg.innerText = "";
            }, 3000);
        });

        // Chama a função de carregar assim que o código rodar
        carregarPerfil();
    </script>
</body>
</html>
